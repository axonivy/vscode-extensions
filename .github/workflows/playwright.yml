name: Playwright Tests
on:
  push:
jobs:
  test:
    env:
      IVY_JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/21.0.3-9.0.LTS/x64
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          java-version: '21.0.3'
          distribution: 'temurin'
      - name: Install dependencies
        run: |
          echo $IVY_JAVA_HOME
          which java
          rm -r /bin/java
          # npm run update:axonivy:next
          env
          npm install
          # npm run build:production
          npm run download:engine https://download.axonivy.com/dev/AxonIvyEngine13.1.0.2502141306_All_x64.zip
      - name: Run Playwright tests
        run: |
          java --version
          extension/AxonIvyEngine/bin/AxonIvyEngine
          # npm run test:playwright:download:vscode
          # xvfb-run --auto-servernum npm run test:playwright
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-videos
          path: playwright/playwright-videos/
          retention-days: 3
